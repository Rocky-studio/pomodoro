<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMODORO TIMER / GREENBACK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #00b140;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #mode-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    letter-spacing: 0.32em;
    color: #ffffff;
    margin-bottom: 4px;
    opacity: 0.85;
  }
  #mode-label.break-mode { color: #f0ece4; opacity: 1; }

  #clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 20vw, 13rem);
    line-height: 1;
    letter-spacing: 0.05em;
    color: #ffffff;
  }
  #clock.break-mode { color: #f5e6b0; }

  #progress-wrap {
    width: clamp(200px, 40vw, 480px);
    height: 3px;
    background: rgba(255,255,255,0.25);
    margin-top: 16px;
    position: relative;
  }
  #progress-bar {
    height: 100%;
    background: #ffffff;
    transform-origin: left;
    transition: transform 1s linear;
  }
  #progress-bar.break-mode { background: #f5e6b0; }

  /* controls — outside green area visually but still on page */
  #controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .ctrl-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    color: rgba(0,0,0,0.55);
    background: rgba(255,255,255,0.7);
    border: none;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: #ffffff; color: #000; }
  #play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #play-btn:hover { background: #ffffff; }
  #play-btn svg { fill: #000; }

  /* hint */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  @keyframes chime-pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  #clock.chime { animation: chime-pulse 0.4s ease; }
</style>
</head>
<body>

<div id="hint">SPACE: play/pause &nbsp;|&nbsp; R: reset &nbsp;|&nbsp; S: skip</div>

<div id="widget">
  <div id="mode-label">FOCUS</div>
  <div id="clock">25:00</div>
  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="reset-btn">RESET</button>
  <button id="play-btn">
    <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
  </button>
  <button class="ctrl-btn" id="skip-btn">SKIP</button>
</div>

<script>
const FOCUS_SEC    = 25 * 60;
const BREAK_SEC    =  5 * 60;
const CHIME_SECS   = new Set([5, 4, 3, 2, 1]);

let audioCtx = null;
let isRunning = false, isBreak = false;
let remaining = FOCUS_SEC, totalSec = FOCUS_SEC;
let timerInterval = null;
let chimeFired = new Set();

const clock       = document.getElementById('clock');
const modeLabel   = document.getElementById('mode-label');
const progressBar = document.getElementById('progress-bar');
const playBtn     = document.getElementById('play-btn');
const playIcon    = document.getElementById('play-icon');
const resetBtn    = document.getElementById('reset-btn');
const skipBtn     = document.getElementById('skip-btn');

// init AudioContext on first interaction
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playChime() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.4);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.65);
  osc.start(); osc.stop(audioCtx.currentTime + 0.65);
  clock.classList.remove('chime'); void clock.offsetWidth; clock.classList.add('chime');
  setTimeout(() => clock.classList.remove('chime'), 400);
}

playBtn.addEventListener('click',  () => { ensureAudio(); toggleTimer(); });
resetBtn.addEventListener('click', () => { ensureAudio(); resetTimer(); });
skipBtn.addEventListener('click',  () => { ensureAudio(); skipPhase(); });

function toggleTimer() { isRunning ? pauseTimer() : resumeTimer(); }

function resumeTimer() {
  isRunning = true;
  playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  timerInterval = setInterval(tick, 1000);
}
function pauseTimer() {
  isRunning = false;
  playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  clearInterval(timerInterval);
}

function tick() {
  if (remaining <= 0) { nextPhase(); return; }
  remaining--;
  if (!isBreak && CHIME_SECS.has(remaining) && !chimeFired.has(remaining)) {
    chimeFired.add(remaining); playChime();
  }
  updateClock(); updateProgress();
}

function nextPhase() {
  clearInterval(timerInterval); isRunning = false; chimeFired.clear();
  if (!isBreak) {
    isBreak = true; remaining = BREAK_SEC; totalSec = BREAK_SEC;
    modeLabel.textContent = 'BREAK';
    clock.classList.add('break-mode');
    modeLabel.classList.add('break-mode');
    progressBar.classList.add('break-mode');
  } else {
    isBreak = false; remaining = FOCUS_SEC; totalSec = FOCUS_SEC;
    modeLabel.textContent = 'FOCUS';
    clock.classList.remove('break-mode');
    modeLabel.classList.remove('break-mode');
    progressBar.classList.remove('break-mode');
  }
  updateClock(); updateProgress(); resumeTimer();
}

function resetTimer() {
  pauseTimer(); isBreak = false; remaining = FOCUS_SEC; totalSec = FOCUS_SEC;
  chimeFired.clear();
  modeLabel.textContent = 'FOCUS';
  clock.classList.remove('break-mode');
  modeLabel.classList.remove('break-mode');
  progressBar.classList.remove('break-mode');
  updateClock(); updateProgress();
}
function skipPhase() { remaining = 0; nextPhase(); }

function updateClock() {
  clock.textContent = `${String(Math.floor(remaining/60)).padStart(2,'0')}:${String(remaining%60).padStart(2,'0')}`;
}
function updateProgress() {
  progressBar.style.transform = `scaleX(${remaining / totalSec})`;
}

updateClock(); updateProgress();

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); ensureAudio(); toggleTimer(); }
  if (e.code === 'KeyR')  { ensureAudio(); resetTimer(); }
  if (e.code === 'KeyS')  { ensureAudio(); skipPhase(); }
});
</script>
</body>
</html>
